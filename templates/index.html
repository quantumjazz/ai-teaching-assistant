<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Teaching Assistant Chat</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css', v=static_asset_version) }}">
</head>
<body class="chat-page">
  <div class="chat-shell">
    <header class="chat-header">
      <div class="brand-block">
        <span class="brand-mark" aria-hidden="true">AI</span>
        <div>
          <h1>Teaching Assistant</h1>
          <p id="session-status">New chat</p>
        </div>
      </div>
      <div class="header-actions">
        <button id="new-chat-button" class="new-chat-button" type="button">New chat</button>
        <nav class="chat-nav" aria-label="Secondary navigation">
          <a href="{{ url_for('documents_page') }}">Documents</a>
          <a href="{{ url_for('setup') }}">Setup</a>
        </nav>
      </div>
    </header>

    <main class="chat-main">
      <section id="response" class="conversation" aria-live="polite">
        <div id="empty-state" class="empty-state">
          <div class="empty-brand-mark" aria-hidden="true">AI</div>
          <h2>Ask about the indexed course materials</h2>
          <p class="empty-state-copy">
            Use a specific concept, author, theory, or passage from the course corpus.
          </p>
          <div class="example-actions" aria-label="Example prompts">
            <button type="button" class="example-action" data-mode="ask" data-prompt='Какво са "остатъчни права на собственост"?'>Residual rights</button>
            <button type="button" class="example-action" data-mode="ask" data-prompt="Какво е принципал-агентски проблем?">Principal-agent</button>
            <button type="button" class="example-action" data-mode="ask" data-prompt="Какво са транзакционни разходи?">Transaction costs</button>
            <button type="button" class="example-action" data-mode="quiz" data-prompt="остатъчни права на собственост">Quiz this topic</button>
          </div>
        </div>
      </section>

      <form id="chat-form" class="chat-composer" action="javascript:void(0)">
        <div class="mode-tabs" role="tablist" aria-label="Message mode">
          <button type="button" class="mode-tab active" data-mode="ask" aria-pressed="true">Ask</button>
          <button type="button" class="mode-tab" data-mode="quiz" aria-pressed="false">Quiz</button>
          <button type="button" class="mode-tab" data-mode="check" aria-pressed="false">Check answer</button>
        </div>
        <div class="composer-box">
          <label for="query" class="sr-only">Message</label>
          <textarea id="query" rows="1" placeholder="Ask about a specific concept, author, model, or passage..."></textarea>
          <button id="submit-button" type="submit" aria-label="Send message">Send</button>
        </div>
        <p class="composer-hint">Enter to send, Shift+Enter for a new line</p>
      </form>
    </main>
  </div>

  <script src="{{ url_for('static', filename='js/queryProcess.js', v=static_asset_version) }}"></script>
</body>
</html>
